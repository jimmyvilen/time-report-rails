sv:
  date:
    formats:
      default: "%Y-%m-%d"
      short: "%-d %b"
      long: "%-d %B %Y"
      day_name: "%A %-d %B"
    day_names:
      - söndag
      - måndag
      - tisdag
      - onsdag
      - torsdag
      - fredag
      - lördag
    abbr_day_names:
      - sön
      - mån
      - tis
      - ons
      - tor
      - fre
      - lör
    month_names:
      - ~
      - januari
      - februari
      - mars
      - april
      - maj
      - juni
      - juli
      - augusti
      - september
      - oktober
      - november
      - december
    abbr_month_names:
      - ~
      - jan
      - feb
      - mar
      - apr
      - maj
      - jun
      - jul
      - aug
      - sep
      - okt
      - nov
      - dec
  time:
    formats:
      default: "%A, %-d %B %Y %H:%M"
      short: "%-d %b %H:%M"
      long: "%-d %B %Y %H:%M"
  activerecord:
    errors:
      messages:
        record_invalid: "Valideringen misslyckades: %{errors}"
        restrict_dependent_destroy:
          has_one: "Posten kan inte tas bort eftersom den refererade %{record} finns kvar"
          has_many: "Posten kan inte tas bort eftersom refererade %{record} finns kvar"
